<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate YouTube Music Streamer</title>
    <style>
        :root {
            --bg: #090909;
            --surface: #1a1a1a;
            --accent: #1DB954;
            --text: #ffffff;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .player-card {
            width: 380px;
            height: 700px;
            background: var(--surface);
            border-radius: 30px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        #yt-hidden-player {
            display: none; /* Keeps the video invisible but the audio plays */
        }
        .art-box {
            width: 100%;
            aspect-ratio: 1/1;
            background: #222;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .art-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .track-info {
            text-align: center;
            margin-bottom: 20px;
        }
        .track-info h2 {
            margin: 0;
            font-size: 1.4rem;
        }
        .track-info p {
            color: #b3b3b3;
            margin: 5px 0;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .play-btn {
            width: 60px;
            height: 60px;
            background: white;
            color: black;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .playlist {
            flex-grow: 1;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 15px;
            padding: 10px;
        }
        .song-item {
            display: flex;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }
        .song-item:hover { background: #333; }
        .song-item.active { color: var(--accent); }
        .status-msg {
            font-size: 10px;
            color: #555;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="player-card">
    <div id="yt-hidden-player"></div>

    <div class="art-box">
        <img id="display-art" src="https://picsum.photos/seed/music/400" alt="Cover">
    </div>

    <div class="track-info">
        <h2 id="display-title">Welcome</h2>
        <p id="display-artist">Select a song to start</p>
    </div>

    <div class="controls">
        <button class="btn" id="prev-btn">⏮</button>
        <button class="btn play-btn" id="play-pause">▶</button>
        <button class="btn" id="next-btn">⏭</button>
    </div>

    <div class="playlist" id="list"></div>
    <div class="status-msg" id="status">System: Ready</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    const songs = [
        { title: "Love Story", artist: "Taylor Swift", q: "Taylor Swift Love Story" },
        { title: "The Nights", artist: "Avicii", q: "Avicii The Nights" },
        { title: "Timber", artist: "Pitbull ft. Kesha", q: "Pitbull Timber Official" },
        { title: "Ordinary", artist: "Alex Warren", q: "Alex Warren Ordinary" },
        { title: "As It Was", artist: "Harry Styles", q: "Harry Styles As It Was" },
        { title: "Blinding Lights", artist: "The Weeknd", q: "The Weeknd Blinding Lights" },
        { title: "Carol Of The Bells", artist: "Tommee Profitt", q: "Tommee Profitt Carol of the Bells" },
        { title: "Cotton Eye Joe", artist: "Rednex", q: "Rednex Cotton Eye Joe" },
        { title: "Stay", artist: "The Kid LAROI", q: "Stay Kid Laroi" },
        { title: "Enemy", artist: "Imagine Dragons", q: "Imagine Dragons Enemy" },
        { title: "Gangnam Style", artist: "PSY", q: "PSY Gangnam Style" },
        { title: "Waka Waka", artist: "Shakira", q: "Shakira Waka Waka" },
        { title: "Believer", artist: "Imagine Dragons", q: "Imagine Dragons Believer" },
        { title: "Perfect", artist: "Ed Sheeran", q: "Ed Sheeran Perfect" },
        { title: "Counting Stars", artist: "OneRepublic", q: "OneRepublic Counting Stars" }
        // ... add the rest here!
    ];

    let player;
    let currentIdx = 0;
    let playing = false;

    // Initialize YouTube
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-hidden-player', {
            height: '0', width: '0',
            playerVars: { 'autoplay': 0, 'listType': 'search', 'list': songs[0].q },
            events: { 'onReady': onReady, 'onStateChange': onStateChange }
        });
    }

    function onReady() {
        document.getElementById('status').innerText = "System: Engine Loaded";
        renderList();
    }

    function loadAndPlay(idx) {
        currentIdx = idx;
        const s = songs[idx];
        document.getElementById('display-title').innerText = s.title;
        document.getElementById('display-artist').innerText = s.artist;
        document.getElementById('status').innerText = "Searching: " + s.title;
        
        // This command tells YouTube to search and play the top result
        player.loadPlaylist({
            list: s.q,
            listType: 'search',
            index: 0
        });
        
        playing = true;
        document.getElementById('play-pause').innerText = "⏸";
        renderList();
    }

    function onStateChange(event) {
        if (event.data == YT.PlayerState.PLAYING) {
            document.getElementById('status').innerText = "Playing: " + songs[currentIdx].title;
        }
        if (event.data == YT.PlayerState.ENDED) {
            next();
        }
    }

    function renderList() {
        const list = document.getElementById('list');
        list.innerHTML = "";
        songs.forEach((s, i) => {
            const div = document.createElement('div');
            div.className = `song-item ${i === currentIdx ? 'active' : ''}`;
            div.innerHTML = `<strong>${s.title}</strong> &nbsp; - ${s.artist}`;
            div.onclick = () => loadAndPlay(i);
            list.appendChild(div);
        });
    }

    document.getElementById('play-pause').onclick = () => {
        if (!playing) {
            player.playVideo();
            document.getElementById('play-pause').innerText = "⏸";
        } else {
            player.pauseVideo();
            document.getElementById('play-pause').innerText = "▶";
        }
        playing = !playing;
    };

    function next() {
        currentIdx = (currentIdx + 1) % songs.length;
        loadAndPlay(currentIdx);
    }
    
    document.getElementById('next-btn').onclick = next;
    document.getElementById('prev-btn').onclick = () => {
        currentIdx = (currentIdx - 1 + songs.length) % songs.length;
        loadAndPlay(currentIdx);
    };
</script>
</body>
</html>
